name: YtDlpGUI WinUI CI

on:
  push:
    paths:
      - "YtDlpGUI.sln"
      - "src/YtDlpGUI/**"
      - "src/YtDlpGUI.Core/**"
      - "src/YtDlpGUI.Infrastructure/**"
      - ".github/workflows/ytdlpgui-winui-ci.yml"
  pull_request:
    paths:
      - "YtDlpGUI.sln"
      - "src/YtDlpGUI/**"
      - "src/YtDlpGUI.Core/**"
      - "src/YtDlpGUI.Infrastructure/**"
      - ".github/workflows/ytdlpgui-winui-ci.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\YtDlpGUI.sln

      - name: Build (Release)
        run: dotnet build .\YtDlpGUI.sln -c Release --no-restore
